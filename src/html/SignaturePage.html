<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .info-box {
      background: #e8f0fe;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .info-box strong { color: #1a73e8; }
    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active {
      color: #4285f4;
      border-bottom-color: #4285f4;
    }
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      color: #888;
      font-size: 14px;
      margin-bottom: 12px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover { border-color: #4285f4; background: #f8faff; }
    .upload-area .icon { font-size: 36px; margin-bottom: 8px; }
    .upload-area img {
      max-width: 100%;
      max-height: 140px;
      border-radius: 4px;
    }
    .upload-area .reselect {
      margin-top: 8px;
      font-size: 12px;
      color: #4285f4;
      cursor: pointer;
    }
    .canvas-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .canvas-wrapper {
      border: 2px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      position: relative;
      margin-bottom: 12px;
    }
    .canvas-wrapper.active { border-color: #4285f4; }
    canvas {
      display: block;
      width: 100%;
      height: 180px;
      touch-action: none;
      cursor: crosshair;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-clear {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
      flex: 0.4;
    }
    .btn-submit { background: #4285f4; color: #fff; flex: 0.6; }

    #status {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    .status-success {
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 18px;
      font-weight: bold;
      padding: 20px;
      animation: fadeInUp 0.4s ease;
    }
    .status-success .check-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .status-error { background: #fce4ec; color: #c62828; }
    .status-loading { background: #e3f2fd; color: #1565c0; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(1) infinite;
    }

    .section-label {
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin: 16px 0 8px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .section-label .required {
      color: #ea4335;
      font-size: 12px;
      margin-left: 4px;
    }
    .id-upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      color: #888;
      font-size: 14px;
      margin-bottom: 12px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .id-upload-area:hover { border-color: #4285f4; background: #f8faff; }
    .id-upload-area .icon { font-size: 28px; margin-bottom: 6px; }
    .id-upload-area img {
      max-width: 100%;
      max-height: 120px;
      border-radius: 4px;
    }
    .id-upload-area .reselect {
      margin-top: 8px;
      font-size: 12px;
      color: #4285f4;
      cursor: pointer;
    }

    .agreement {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>임대차계약서 전자서명</h2>
  <p class="subtitle">아래 서명란에 서명해주세요</p>

  <div class="info-box" id="infoBox" style="display:none;">
    <strong>서명자:</strong> <span id="signerName"></span><br>
    <strong>소재지:</strong> <span id="propertyAddr"></span>
  </div>

  <div class="tab-row">
    <div class="tab active" id="tabDraw" onclick="switchTab('draw')">서명 그리기</div>
    <div class="tab" id="tabUpload" onclick="switchTab('upload')">도장 업로드</div>
  </div>

  <div id="drawSection">
    <p class="canvas-label">서명란 (마우스 또는 터치로 서명)</p>
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="signatureCanvas"></canvas>
    </div>
  </div>

  <div id="uploadSection" style="display:none;">
    <input type="file" id="stampInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('stampInput').click()">
      <div class="icon">&#128206;</div>
      <div>도장 이미지를 선택하세요</div>
      <div style="font-size:12px; color:#aaa; margin-top:4px;">PNG, JPG 파일 지원</div>
    </div>
  </div>

  <!-- 신분증 업로드 (웹앱 모드에서만 표시) -->
  <div id="idCardSection" style="display:none;">
    <p class="section-label">신분증 사본 업로드<span class="required">(필수)</span></p>
    <input type="file" id="idCardInput" accept="image/*" style="display:none;" onchange="handleIdCardSelect(event)">
    <div class="id-upload-area" id="idCardArea" onclick="document.getElementById('idCardInput').click()">
      <div class="icon">&#128196;</div>
      <div>신분증 사본을 선택하세요</div>
      <div style="font-size:12px; color:#aaa; margin-top:4px;">PNG, JPG 파일 지원 (5MB 이하)</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-clear" onclick="clearCanvas()">지우기</button>
    <button class="btn btn-submit" id="submitBtn" onclick="submitSignature()">서명 제출</button>
  </div>

  <div id="status"></div>

  <p class="agreement">
    서명 제출 시 본 계약서의 내용을 확인하고<br>동의하는 것으로 간주됩니다.
  </p>
</div>

<script>
  // ---- 설정 ----
  var isWebApp = false;
  var token = '';

  // 서버에서 전달된 템플릿 변수 (웹앱 모드일 때)
  try {
    isWebApp = <?= isWebApp ?> || false;
    token = '<?= token ?>';
    var tName = '<?= tenantName ?>';
    var pAddr = '<?= propertyAddress ?>';

    if (tName) {
      document.getElementById('signerName').textContent = tName;
      document.getElementById('propertyAddr').textContent = pAddr;
      document.getElementById('infoBox').style.display = 'block';
    }
    if (isWebApp) {
      document.getElementById('idCardSection').style.display = 'block';
    }
  } catch(e) {
    // 다이얼로그 모드 (임대인 서명) - 템플릿 변수 없음
    isWebApp = false;
  }

  // ---- 신분증 업로드 ----
  var idCardDataUrl = null;

  function handleIdCardSelect(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (!file.type.match('image.*')) {
      showStatus('이미지 파일만 업로드 가능합니다.', 'error');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      showStatus('파일 크기는 5MB 이하여야 합니다.', 'error');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(ev) {
      idCardDataUrl = ev.target.result;
      var area = document.getElementById('idCardArea');
      area.innerHTML = '<img src="' + idCardDataUrl + '">' +
        '<div class="reselect">다른 이미지 선택</div>';
    };
    reader.readAsDataURL(file);
  }

  // ---- 탭 전환 ----
  var activeTab = 'draw';
  var uploadedDataUrl = null;

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tabDraw').className = tab === 'draw' ? 'tab active' : 'tab';
    document.getElementById('tabUpload').className = tab === 'upload' ? 'tab active' : 'tab';
    document.getElementById('drawSection').style.display = tab === 'draw' ? 'block' : 'none';
    document.getElementById('uploadSection').style.display = tab === 'upload' ? 'block' : 'none';
  }

  // ---- 파일 업로드 ----
  function handleFileSelect(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (!file.type.match('image.*')) {
      showStatus('이미지 파일만 업로드 가능합니다.', 'error');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      showStatus('파일 크기는 5MB 이하여야 합니다.', 'error');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(ev) {
      uploadedDataUrl = ev.target.result;
      var area = document.getElementById('uploadArea');
      area.innerHTML = '<img src="' + uploadedDataUrl + '">' +
        '<div class="reselect">다른 이미지 선택</div>';
    };
    reader.readAsDataURL(file);
  }

  // ---- 캔버스 초기화 ----
  var canvas = document.getElementById('signatureCanvas');
  var ctx = canvas.getContext('2d');
  var wrapper = document.getElementById('canvasWrapper');
  var isDrawing = false;
  var hasDrawn = false;
  var lastX, lastY;

  function initCanvas() {
    var rect = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  initCanvas();
  window.addEventListener('resize', function() {
    if (!hasDrawn) initCanvas();
  });

  // ---- 이벤트: 마우스 ----
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
  }

  canvas.addEventListener('mousedown', function(e) {
    isDrawing = true;
    var p = getPos(e);
    lastX = p.x;
    lastY = p.y;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    wrapper.classList.add('active');
  });

  canvas.addEventListener('mousemove', function(e) {
    if (!isDrawing) return;
    hasDrawn = true;
    var p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x;
    lastY = p.y;
  });

  canvas.addEventListener('mouseup', function() {
    isDrawing = false;
    wrapper.classList.remove('active');
  });

  canvas.addEventListener('mouseleave', function() {
    isDrawing = false;
    wrapper.classList.remove('active');
  });

  // ---- 이벤트: 터치 ----
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    isDrawing = true;
    var p = getPos(e);
    lastX = p.x;
    lastY = p.y;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    wrapper.classList.add('active');
  });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (!isDrawing) return;
    hasDrawn = true;
    var p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x;
    lastY = p.y;
  });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    isDrawing = false;
    wrapper.classList.remove('active');
  });

  // ---- 기능 ----
  function clearCanvas() {
    var dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    hasDrawn = false;
  }

  function submitSignature() {
    var dataUrl;
    if (activeTab === 'draw') {
      if (!hasDrawn) {
        showStatus('서명을 해주세요.', 'error');
        return;
      }
      dataUrl = canvas.toDataURL('image/png');
    } else {
      if (!uploadedDataUrl) {
        showStatus('도장 이미지를 선택해주세요.', 'error');
        return;
      }
      dataUrl = uploadedDataUrl;
    }

    // 웹앱 모드: 신분증 필수 검증
    if (isWebApp && !idCardDataUrl) {
      showStatus('신분증 사본을 업로드해주세요.', 'error');
      return;
    }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    showLoadingProgress();

    if (isWebApp) {
      // 웹앱 모드: 임차인 서명 (토큰 사용)
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .processSignature(token, dataUrl, idCardDataUrl);
    } else {
      // 다이얼로그 모드: 임대인 서명
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .processLandlordSignature(dataUrl);
    }
  }

  var loadingTimer = null;

  function showLoadingProgress() {
    var steps = [
      '서명을 처리하고 있습니다',
      '이미지를 저장하고 있습니다',
      '계약서에 반영하고 있습니다',
      '거의 완료되었습니다'
    ];
    var i = 0;
    showStatusHtml('<span class="loading-dots">' + steps[0] + '</span>', 'loading');
    loadingTimer = setInterval(function() {
      i++;
      if (i < steps.length) {
        showStatusHtml('<span class="loading-dots">' + steps[i] + '</span>', 'loading');
      }
    }, 2500);
  }

  function onSuccess() {
    if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
    showStatusHtml('<span class="check-icon">&#10004;</span>서명이 완료되었습니다!<br><span style="font-size:14px;font-weight:normal;">감사합니다.</span>', 'success');
    document.getElementById('submitBtn').textContent = '완료';

    // 다이얼로그 모드이면 잠시 후 닫기
    if (!isWebApp) {
      setTimeout(function() {
        google.script.host.close();
      }, 2000);
    }
  }

  function onFailure(err) {
    if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
    showStatus('오류: ' + (err.message || err), 'error');
    var btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.textContent = '서명 제출';
  }

  function showStatus(text, type) {
    var el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status-' + type;
    el.style.display = 'block';
  }

  function showStatusHtml(html, type) {
    var el = document.getElementById('status');
    el.innerHTML = html;
    el.className = 'status-' + type;
    el.style.display = 'block';
  }
</script>

</body>
</html>
